<!doctype html>
<html>
  <head>
    <title>Agreement Score Test</title>
  </head>
  <body>
    <h1>Agreement Score Display Test</h1>
    <div id="result">Loading...</div>

    <script>
      async function testAgreementScore() {
        try {
          const response = await fetch(
            "https://trader.kooexperience.com/api/daily-report?limit=1",
          );
          const data = await response.json();
          const setup = data.latest.signals.setup_quality_top[0];

          const result = document.getElementById("result");
          result.innerHTML = `
                    <h2>First Setup: ${setup.ticker}</h2>
                    <p><strong>Has debate_agreement_score field:</strong> ${"debate_agreement_score" in setup}</p>
                    <p><strong>debate_agreement_score value:</strong> ${setup.debate_agreement_score}</p>
                    <p><strong>Formatted display:</strong> Agree ${setup.debate_agreement_score ? setup.debate_agreement_score.toFixed(1) + "%" : "N/A"}</p>
                    <hr>
                    <h3>All debate fields:</h3>
                    <pre>${JSON.stringify(
                      Object.keys(setup).filter((k) => k.includes("debate")),
                      null,
                      2,
                    )}</pre>
                `;
        } catch (error) {
          document.getElementById("result").innerHTML =
            `<p style="color: red;">Error: ${error.message}</p>`;
        }
      }

      testAgreementScore();
    </script>
  </body>
</html>
